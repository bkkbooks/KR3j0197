body:
  text: 陸氏要覽列子御風常以立春歸乎八荒立秋遊乎風穴是風至則草木發生去則搖落謂之離合風太平御覽卷九又卷二十五陶宗儀說郛採為第一節昔羽山有神人焉逍遙于中岳與左元放共遊薊子訓所坐欲起子訓應欲留之一日之中三雨今呼五月三雨亦為留客雨太平御覽卷二十二說郛第二節九花樹生南岳雖經雪凝寒花必開便落時人謂之應春花太平御覽卷二十說郛第三節萬歲蟾蜍頭上有角頷下有丹書重八字名曰肉芝以五月五日取陰乾以其足畫地即流水帶之於身能辟兵說郛第四節案與太平御覽卷九百四十九引抱朴子略同東弓南矛西劍北戟中鼓亦曰四兵太平御覽卷三百三十九記郛第五節西陽山中有甘谷谷中皆菊花水中居人飲之多壽有及一百五十有餘歲者說郛第六節案與太平御覽卷九百九十六引風俗通略同千歲龜五色額上骨起如角巢於蓮葉之上或在叢蓍之下說郛第七節案與太平御覽卷九百三十一引枹朴子略同立夏日服六壬癸符或服玄水丸飛霜散暑不能侵也說郛第八節陳思有鵲尾杓植而長置之酒樽凡玉欲勸者呼之尾則指其人說郛第九節夏樹名連陰夏雨名緜雨太平御覽卷二十二引陸機纂要秋樹名成秋雨名愁太平御覽卷二十五
